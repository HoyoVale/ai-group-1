name: crawler CI

on:
  push:
    branches:
      - main
      - "agent/**"
      - "feature/**"
    paths:
      - "projects/crawler/**"
      - ".github/workflows/crawler-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "projects/crawler/**"
      - ".github/workflows/crawler-ci.yml"
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Force a controlled failure for OpenClaw CI bridge validation"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: crawler-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawler-pytest:
    name: crawler / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: projects/crawler
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            projects/crawler/requirements.txt
            projects/crawler/constraints.txt

      - name: Install PDF runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install crawler dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run crawler pytest suite
        run: python -m pytest tests -q

      - name: Force controlled failure for bridge validation
        if: ${{ inputs.force_fail }}
        run: |
          echo "Forced failure for OpenClaw bridge validation" >&2
          exit 1
